<!DOCTYPE html>
<html lang="es" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Entregas</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.11/css/dataTables.bootstrap5.min.css">

  <style>
    :root {
      --bg: #F3F2F1;
      --surface: #FFFFFF;
      --surface-alt: #FAFAFA;
      --text: #201F1E;
      --text-muted: #605E5C;
      --border: #E1DFDD;
      --primary: #5B5FC7;
      --primary-dark: #464775;
      --accent: #00B7C3;
      --success: #107C10;
      --warning: #C19C00;
      --danger: #D13438;
      --shadow: 0 2px 10px rgba(31, 30, 29, 0.08);
      --shadow-hover: 0 6px 18px rgba(31, 30, 29, 0.14);
      --radius: 12px;
    }

    html[data-theme="dark"] {
      --bg: #1B1A19;
      --surface: #252423;
      --surface-alt: #2D2C2B;
      --text: #F3F2F1;
      --text-muted: #C8C6C4;
      --border: #3B3A39;
      --primary: #8B8FE0;
      --primary-dark: #6A6FCB;
      --accent: #34D6E0;
      --shadow: 0 2px 10px rgba(0, 0, 0, 0.45);
      --shadow-hover: 0 6px 20px rgba(0, 0, 0, 0.55);
    }

    * {
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", -apple-system, Roboto, Helvetica, Arial, sans-serif;
      transition: background .25s ease, color .25s ease;
    }

    .topbar {
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      color: #fff;
      box-shadow: var(--shadow);
    }

    .topbar .brand-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: rgba(255, 255, 255, .18);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
    }

    .card-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      transition: box-shadow .2s ease;
    }

    .card-panel:hover {
      box-shadow: var(--shadow-hover);
    }

    .dropzone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      background: var(--surface-alt);
      padding: 2.5rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: .2s ease;
    }

    .dropzone.dragover {
      border-color: var(--primary);
      background: rgba(91, 95, 199, .08);
    }

    .dropzone i {
      font-size: 2.4rem;
      color: var(--primary);
    }

    .kpi-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1.1rem 1.3rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      height: 100%;
    }

    .kpi-icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      color: #fff;
      flex-shrink: 0;
    }

    .kpi-value {
      font-size: 1.6rem;
      font-weight: 700;
      line-height: 1.1;
    }

    .kpi-label {
      font-size: .78rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .section-title {
      font-size: .95rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .04em;
      margin-bottom: .6rem;
    }

    .filters-bar .form-select,
    .filters-bar .form-control {
      background: var(--surface-alt);
      border: 1px solid var(--border);
      color: var(--text);
    }

    #tabla-card {
      padding: 1.2rem;
    }

    table.dataTable thead th {
      background: var(--surface-alt);
      color: var(--text);
      border-bottom: 2px solid var(--primary) !important;
      position: sticky;
      top: 0;
      text-align: center !important;
    }

    table.dataTable tbody td {
      color: var(--text);
      border-color: var(--border) !important;
      background: var(--surface);
      text-align: center !important;
    }

    table.dataTable tfoot th {
      background: var(--surface-alt) !important;
      color: var(--text) !important;
      font-weight: 700;
      border-top: 2px solid var(--border) !important;
      text-align: center !important;
    }

    .btn-export {
      border: 1px solid var(--border);
      background: var(--surface-alt);
      color: var(--text);
    }

    .btn-export:hover {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    .empty-state {
      padding: 4rem 1rem;
      text-align: center;
      color: var(--text-muted);
    }

    .empty-state i {
      font-size: 3rem;
      color: var(--primary);
      opacity: .6;
    }
  </style>
</head>

<body>

  <nav class="topbar py-3 px-3 px-md-4 d-flex align-items-center justify-content-between sticky-top">
    <div class="d-flex align-items-center gap-3">
      <div class="brand-icon"><i class="bi bi-truck"></i></div>
      <div>
        <div class="fw-bold fs-5">Panel de Entregas y Distribución</div>
        <div class="small opacity-75">Control logístico de preparación de materiales</div>
      </div>
    </div>
    <div class="d-flex align-items-center gap-2">
      <button id="btnCambiarArchivo" class="btn btn-sm btn-light d-none">
        <i class="bi bi-upload"></i> <span class="d-none d-md-inline">Cambiar archivo</span>
      </button>
      <button id="btnTema" class="btn btn-sm btn-outline-light">
        <i class="bi bi-moon-stars-fill"></i> Contrastes
      </button>
    </div>
  </nav>

  <div class="container-fluid px-3 px-md-4 py-4">

    <div id="zonaCarga" class="card-panel p-3 mb-4">
      <div id="dropzone" class="dropzone">
        <i class="bi bi-file-earmark-spreadsheet d-block mb-2"></i>
        <div class="fw-semibold mb-1">Arrastra tu archivo EXPORT aquí o hace clic para seleccionarlo</div>
        <div class="text-muted small">Admite formatos .xlsx, .xls y .csv</div>
        <input type="file" id="inputArchivo" accept=".xlsx,.xls,.csv" class="d-none">
      </div>
      <div id="archivoInfo" class="d-flex align-items-center gap-2 mt-2 small text-muted d-none">
        <i class="bi bi-check-circle-fill text-success"></i>
        <span id="nombreArchivo"></span>
      </div>
    </div>

    <div id="estadoVacio" class="empty-state">
      <i class="bi bi-clipboard-data d-block mb-2"></i>
      <div class="fs-5 fw-semibold">Todavía no cargaste el archivo de entregas</div>
      <div>Subí tu Excel para ver los cuadros resumidos filtrados y preparar tus PDFs.</div>
    </div>

    <div id="dashboardContent" class="d-none">

      <div
